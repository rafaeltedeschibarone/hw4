databases:
  - name: travel-journal-db
    databaseName: travel_journal_production
    user: travel_journal
    plan: free

services:
  - type: web
    name: travel-journal
    runtime: ruby
    plan: free
    buildCommand: bundle install && rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: travel-journal-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
